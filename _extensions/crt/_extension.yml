title: Formato de Relatório de Pesquisa
author: Diego Carvalho
version: 0.1.0
quarto-required: ">= 1.7.24"
contributes:
  formats:
    common:
      lang: pt
      region: BR
      # define below YAML configuration common to all formats
      filters:
        # You can include here Lua filters from your extension format
        - color-text.lua
        - short-titles.lua
      shortcodes:
        # You can include here Lua filters defining shortcodes from your extension
        - shortcodes.lua
      knitr:
        opts_chunk:
          echo: false
    pdf:
      # define default configuration for the pdf version of your format
      documentclass: relatpesq
      papersize: a4
      pdf-standard: a-2b
      pdf-engine: lualatex
      mainfont: Sofia Sans Condensed
      mainfontoptions:
        - FontWeight=Regular
      sansfont: Roboto
      monofont: Roboto Mono
      monofontfontoptions:
        - Color=0019D4
      toc: true
      toc-title: Sumário
      toc-depth: 1
      number-sections: true
      number-depth: 1
      number-lines: false
      colorlinks: true
      syntax-highlighting: github
      cite-method: biblatex
      csl: ieee-access.csl

      urlcolor: blue
      fig-width: 6.5
      fig-height: 4.5
      # This format use a bst file with natbib
      header-includes: |
        \usepackage{orcidlink}
        \definecolor{mypink}{RGB}{219, 48, 122}
      template-partials:
        # Add here the partials your format is using
        #        - "partials/title.tex"
        - "partials/after-header-includes.latex"
        - "partials/title.tex"
        - "partials/before-body.tex"

      format-resources:
        # Add here the resources required for the PDF rendering
        - relatpesq.cls
    html:
      # define default configuration for the html version of your format
      number-sections: true
      toc: true
      theme: custom.scss
      # Use a CSL file to style (https://www.zotero.org/styles/)
      csl: https://www.zotero.org/styles/journal-of-institutional-and-theoretical-economics
